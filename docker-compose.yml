name: jetson-ai-dashboard

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          memory: 700M
          cpus: '4'

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    deploy:
      resources:
        limits:
          memory: 300M
